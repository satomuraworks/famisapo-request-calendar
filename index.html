<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>ファミサポ依頼日一覧</title>
    <link rel="stylesheet" href="styles.css?v=20260723" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <p class="eyebrow">FAMILY SUPPORT CENTER</p>
        <h1>ファミサポ依頼日一覧</h1>
        <p>お迎えを依頼する日を選び、LINE用の文章と画像を作成します。</p>
      </header>

      <section class="card month-card" aria-labelledby="month-heading">
        <h2 id="month-heading">対象年月</h2>
        <label class="month-picker" for="target-month">
          <span>依頼する月</span>
          <input id="target-month" type="month" inputmode="numeric" />
        </label>
        <p class="hint">初期状態では、祝日を除く月曜日から木曜日が選択されています。</p>
      </section>

      <section class="card" aria-labelledby="calendar-heading">
        <div class="section-heading">
          <h2 id="calendar-heading">依頼日を選択</h2>
          <p id="calendar-month-label" aria-live="polite"></p>
        </div>
        <div class="weekday-row" aria-hidden="true">
          <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
        </div>
        <div id="calendar" class="calendar-grid" aria-label="依頼日カレンダー"></div>
        <p class="hint">日付をタップすると、選択・選択解除できます。金・土・日も選択できます。</p>
      </section>

      <section class="card confirmation-card" aria-labelledby="confirmation-heading">
        <div class="section-heading">
          <h2 id="confirmation-heading">送信内容の確認</h2>
          <p id="selection-summary" aria-live="polite"></p>
        </div>
        <ul id="selected-dates" class="selected-dates" aria-label="選択した依頼日"></ul>
        <div class="estimate" aria-label="画面上の概算金額">
          <span>概算金額（1回 1,150円）</span>
          <strong id="estimated-cost">¥0</strong>
        </div>
      </section>

      <section class="card line-card" aria-labelledby="line-heading">
        <div class="section-heading">
          <h2 id="line-heading">LINE用文章</h2>
          <button id="copy-button" class="button secondary" type="button">文章をコピー</button>
        </div>
        <textarea id="line-message" readonly aria-label="LINE用文章"></textarea>
        <p id="copy-status" class="status" aria-live="polite"></p>
      </section>

      <section class="card image-card" aria-labelledby="image-heading">
        <div class="section-heading">
          <h2 id="image-heading">送信用PNG画像</h2>
          <p>1080 × 1350 px</p>
        </div>
        <button id="generate-button" class="button primary full" type="button">内容を確認してPNG画像を生成</button>
        <p id="image-status" class="status" aria-live="polite"></p>
        <div id="image-preview-wrap" class="image-preview-wrap" hidden>
          <canvas id="image-canvas" width="1080" height="1350" aria-label="生成した送信用画像のプレビュー"></canvas>
          <div class="image-actions">
            <button id="download-button" class="button secondary" type="button">PNG画像を保存</button>
            <button id="share-button" class="button secondary" type="button" hidden>共有シートを開く</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="app.js?v=20260724"></script>
  </body>
</html>
